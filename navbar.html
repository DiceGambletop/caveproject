<!-- DICE GAMBLETOP NAV COMPONENT -->
<style>
  :root {
    --nav-bg: rgba(10, 13, 18, 0.85);
    --nav-border: rgba(255, 255, 255, 0.08);
    --nav-text: #9ca3af;
    --nav-text-bright: #60a5fa;
    --nav-hover-blue: #3b82f6;
    --nav-dropdown-bg: #0f172a;
    --accent-glow: rgba(59, 130, 246, 0.5);
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #dg-navbar * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Century Gothic', 'Segoe UI', sans-serif;
  }

  #dg-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5%;
    z-index: 9999;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  /* Logo Styling */
  .nav-logo {
    font-weight: 700;
    font-size: 1.2rem;
    color: #fff;
    letter-spacing: 0.15em;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-logo span {
    color: var(--nav-text-bright);
  }

  /* Links Container */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  /* Link Style */
  .nav-item {
    background: none;
    border: none;
    color: var(--nav-text);
    font-size: 0.9rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
    padding: 8px 0;
  }

  /* Hover Underline Effect */
  .nav-item::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--nav-text-bright);
    transition: var(--transition);
  }

  .nav-item:hover {
    color: #fff;
  }

  .nav-item:hover::after {
    width: 100%;
  }

  /* Dropdown Menu */
  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    position: absolute;
    top: 50px;
    right: -20px;
    background: var(--nav-dropdown-bg);
    border: 1px solid var(--nav-border);
    border-radius: 12px;
    padding: 12px;
    min-width: 200px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    transition: var(--transition);
  }

  .dropdown-menu.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .dropdown-menu a {
    display: block;
    padding: 10px 16px;
    color: var(--nav-text);
    text-decoration: none;
    font-size: 0.85rem;
    border-radius: 6px;
    transition: var(--transition);
  }

  .dropdown-menu a:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--nav-text-bright);
    transform: translateX(5px);
  }

  /* The Gamble Button CTA */
  .gamble-btn {
    background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    color: white !important;
    padding: 10px 20px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    border: none !important;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
  }

  .gamble-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    filter: brightness(1.1);
  }

  .gamble-btn:active {
    transform: translateY(0);
  }

  /* Jackpot Animation */
  .rainbow-mode {
    animation: blue-glow 1.5s infinite;
    border-bottom: 2px solid #60a5fa !important;
  }

  @keyframes blue-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(96, 165, 250, 0.4); }
    50% { box-shadow: 0 0 40px rgba(167, 139, 250, 0.6); }
  }

  .arrow {
    font-size: 0.7rem;
    transition: transform 0.3s;
  }
  
  .show + .arrow {
    transform: rotate(180deg);
  }
</style>

<nav id="dg-navbar">
  <a href="/" class="nav-logo">DICE <span>GAMBLETOP</span></a>

  <div class="nav-links">
    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown(event, 'school-drop')">
        Schoolwork <span class="arrow">▼</span>
      </button>
      <div id="school-drop" class="dropdown-menu">
        <a href="/caves">Cave Analysis</a>
        <a href="#">Mathematics</a>
        <a href="#">Science</a>
      </div>
    </div>

    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown(event, 'personal-drop')">
        Personal <span class="arrow">▼</span>
      </button>
      <div id="personal-drop" class="dropdown-menu">
        <a href="#">Projects</a>
        <a href="#">My Setup</a>
        <a href="#">Blog</a>
      </div>
    </div>

    <a href="/experiments" class="nav-item">Experiments</a>

    <button class="nav-item gamble-btn" onclick="gambleClick()">
      Gamble
    </button>
  </div>
</nav>

<script>
  function toggleDropdown(event, id) {
    event.stopPropagation();
    const menu = document.getElementById(id);
    const isVisible = menu.classList.contains('show');
    
    // Close all menus
    document.querySelectorAll('.dropdown-menu').forEach(dm => dm.classList.remove('show'));
    
    // Toggle requested menu
    if (!isVisible) {
      menu.classList.add('show');
    }
  }

  function gambleClick() {
    const nav = document.getElementById('dg-navbar');
    const roll = Math.floor(Math.random() * 100) + 1;

    if (roll === 7) {
      nav.classList.add('rainbow-mode');
      alert("🎰 JACKPOT! The house loses for once.");
    } else {
      alert("The house wins. Better luck next time.");
    }
  }

  // Close menus when clicking outside
  window.addEventListener('click', () => {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
  });
</script>
