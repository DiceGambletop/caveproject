<!-- DICE GAMBLETOP NAV COMPONENT -->
<style>
  /* Root variables updated for a "Blue-Steel" aesthetic */
  :root {
    --nav-bg: rgba(10, 13, 18, 0.9); /* Deep Navy */
    --nav-border: #1f2937; /* Steel Blue Border */
    --nav-text: #b1bac4; /* Soft Grey-Blue */
    --nav-text-bright: #58a6ff; /* Primary Blue */
    --nav-hover-blue: #79c0ff; /* Light Luminous Blue */
    --nav-dropdown-bg: #0d1117;
  }

  /* Reset for nav context using Century Gothic */
  #dg-navbar * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    /* Century Gothic applied as the primary font */
    font-family: 'Century Gothic', AppleGothic, 'Avant Garde', sans-serif;
  }

  #dg-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 9999;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* Logo Styling - Geometric & Blue */
  .nav-logo {
    font-weight: 400; /* Century Gothic looks better at lower weights */
    font-size: 1.1rem;
    color: var(--nav-text-bright);
    letter-spacing: 0.2em;
    text-decoration: none;
    transition: color 0.3s, text-shadow 0.3s;
  }

  .nav-logo:hover {
    color: var(--nav-hover-blue);
    text-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
  }

  /* Links Container */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* Link Style */
  .nav-item {
    background: none;
    border: none;
    color: var(--nav-text);
    font-size: 0.85rem;
    font-weight: 400;
    text-decoration: none;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.05em;
  }

  .nav-item:hover {
    color: var(--nav-hover-blue);
  }

  /* Dropdown Logic */
  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    display: none; 
    position: absolute;
    top: 40px;
    right: 0;
    background: var(--nav-dropdown-bg);
    border: 1px solid var(--nav-border);
    border-radius: 4px;
    padding: 8px 0;
    min-width: 180px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .dropdown-menu a {
    display: block;
    padding: 10px 20px;
    color: var(--nav-text);
    text-decoration: none;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .dropdown-menu a:hover {
    background: rgba(88, 166, 255, 0.1);
    color: var(--nav-hover-blue);
    padding-left: 24px; /* Slight slide effect */
  }

  /* Rainbow Animation for Jackpot - Shifted to blue-purple spectrum */
  .rainbow-mode {
    animation: blue-glow 1.5s linear infinite;
  }

  @keyframes blue-glow {
    0% { border-bottom-color: #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
    50% { border-bottom-color: #bc8cff; box-shadow: 0 0 15px rgba(188, 140, 255, 0.4); }
    100% { border-bottom-color: #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.4); }
  }

  /* Small arrow icon */
  .arrow {
    font-size: 0.6rem;
    opacity: 0.5;
  }
</style>

<nav id="dg-navbar">
  <a href="/" class="nav-logo">DICE GAMBLETOP</a>

  <div class="nav-links">
    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown('school-drop')">
        Schoolwork <span class="arrow">▼</span>
      </button>
      <div id="school-drop" class="dropdown-menu">
        <a href="/caves">Cave Analysis</a>
        <a href="#">Mathematics</a>
        <a href="#">Science</a>
      </div>
    </div>

    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown('personal-drop')">
        Personal <span class="arrow">▼</span>
      </button>
      <div id="personal-drop" class="dropdown-menu">
        <a href="#">Projects</a>
        <a href="#">My Setup</a>
        <a href="#">Blog</a>
      </div>
    </div>

    <a href="/experiments" class="nav-item">Experiments</a>

    <!-- Highlighted Gamble Button -->
    <button class="nav-item" onclick="gambleClick()" style="color: #58a6ff; font-weight: 600; border: 1px solid rgba(88,166,255,0.3); padding: 5px 12px; border-radius: 4px;">
      Gamble
    </button>
  </div>
</nav>

<script>
  function toggleDropdown(id) {
    const menu = document.getElementById(id);
    const isVisible = menu.style.display === 'block';
    
    document.querySelectorAll('.dropdown-menu').forEach(dm => dm.style.display = 'none');
    menu.style.display = isVisible ? 'none' : 'block';
  }

  function gambleClick() {
    const nav = document.getElementById('dg-navbar');
    const roll = Math.floor(Math.random() * 100) + 1;

    if (roll === 7) {
      nav.classList.add('rainbow-mode');
      alert("🎰 JACKPOT! The house loses for once.");
    } else {
      alert("The house wins. Better luck next time.");
    }
  }

  window.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
    }
  });
</script>
