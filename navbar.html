<!-- DICE GAMBLETOP NAV COMPONENT -->
<style>
  /* Root variables to match your Caves doc exactly */
  :root {
    --nav-bg: rgba(13, 17, 23, 0.9);
    --nav-border: #30363d;
    --nav-text: #c9d1d9;
    --nav-text-bright: #f0f6fc;
    --nav-hover-blue: #58a6ff;
    --nav-dropdown-bg: #161b22;
  }

  /* Reset for nav context */
  #dg-navbar * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
  }

  #dg-navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--nav-bg);
    border-bottom: 1px solid var(--nav-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 9999;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* Logo Styling */
  .nav-logo {
    font-weight: 700;
    font-size: 1rem;
    color: var(--nav-text-bright);
    letter-spacing: 0.15em;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-logo:hover {
    color: var(--nav-hover-blue);
  }

  /* Links Container */
  .nav-links {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* Generic Link/Button Style */
  .nav-item {
    background: none;
    border: none;
    color: var(--nav-text);
    font-size: 0.9rem;
    font-weight: 400;
    text-decoration: none;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-item:hover {
    color: var(--nav-hover-blue);
  }

  /* Dropdown Logic */
  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    display: none; /* Controlled by JS */
    position: absolute;
    top: 35px;
    right: 0;
    background: var(--nav-dropdown-bg);
    border: 1px solid var(--nav-border);
    border-radius: 6px;
    padding: 8px 0;
    min-width: 160px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .dropdown-menu a {
    display: block;
    padding: 8px 16px;
    color: var(--nav-text);
    text-decoration: none;
    font-size: 0.85rem;
    transition: background 0.2s;
  }

  .dropdown-menu a:hover {
    background: #1f6feb33;
    color: var(--nav-hover-blue);
  }

  /* Rainbow Animation for Jackpot */
  .rainbow-mode {
    animation: rainbow-glow 1.5s linear infinite;
  }

  @keyframes rainbow-glow {
    0% { border-bottom-color: #ff0000; box-shadow: 0 0 10px #ff000033; }
    33% { border-bottom-color: #00ff00; box-shadow: 0 0 10px #00ff0033; }
    66% { border-bottom-color: #0000ff; box-shadow: 0 0 10px #0000ff33; }
    100% { border-bottom-color: #ff0000; box-shadow: 0 0 10px #ff000033; }
  }

  /* Small arrow icon */
  .arrow {
    font-size: 0.7rem;
    opacity: 0.6;
  }
</style>

<nav id="dg-navbar">
  <a href="/" class="nav-logo">DICE GAMBLETOP</a>

  <div class="nav-links">
    <!-- Schoolwork -->
    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown('school-drop')">
        Schoolwork <span class="arrow">▼</span>
      </button>
      <div id="school-drop" class="dropdown-menu">
        <a href="/caves">Cave Analysis</a>
        <a href="#">Mathematics</a>
        <a href="#">Science</a>
      </div>
    </div>

    <!-- Personal -->
    <div class="dropdown">
      <button class="nav-item" onclick="toggleDropdown('personal-drop')">
        Personal <span class="arrow">▼</span>
      </button>
      <div id="personal-drop" class="dropdown-menu">
        <a href="#">Projects</a>
        <a href="#">My Setup</a>
        <a href="#">Blog</a>
      </div>
    </div>

    <!-- Experiments -->
    <a href="/experiments" class="nav-item">Experiments</a>

    <!-- Gambling -->
    <button class="nav-item" onclick="gambleClick()" style="color: #f85149; font-weight: 600;">
      Gamble
    </button>
  </div>
</nav>

<script>
  function toggleDropdown(id) {
    const menu = document.getElementById(id);
    const isVisible = menu.style.display === 'block';
    
    // Hide all first
    document.querySelectorAll('.dropdown-menu').forEach(dm => dm.style.display = 'none');
    
    // Toggle the clicked one
    menu.style.display = isVisible ? 'none' : 'block';
  }

  function gambleClick() {
    const nav = document.getElementById('dg-navbar');
    const roll = Math.floor(Math.random() * 100) + 1;

    if (roll === 7) { // 1 in 100 chance
      nav.classList.add('rainbow-mode');
      alert("🎰 JACKPOT! The house loses for once. Enjoy the glow.");
    } else {
      alert("The house wins. Better luck next time.");
    }
  }

  // Close dropdowns if user clicks away
  window.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
    }
  });
</script>
