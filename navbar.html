<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link to your separate CSS file -->
    <link rel="stylesheet" href="navbar.css">
</head>
<body>

<nav id="dg-navbar">
    <div class="nav-container">
        <a href="/" class="nav-logo">DICE <span>GAMBLETOP</span></a>

        <div class="nav-links">
            <!-- Schoolwork Dropdown -->
            <div class="dropdown">
                <button class="nav-item" onclick="toggleDropdown(event, 'school-drop')">
                    Schoolwork <span class="arrow">▼</span>
                </button>
                <div id="school-drop" class="dropdown-menu">
                    <a href="/caves">Cave Analysis</a>
                    <a href="#">Mathematics</a>
                    <a href="#">Science</a>
                </div>
            </div>

            <!-- Personal Dropdown -->
            <div class="dropdown">
                <button class="nav-item" onclick="toggleDropdown(event, 'personal-drop')">
                    Personal <span class="arrow">▼</span>
                </button>
                <div id="personal-drop" class="dropdown-menu">
                    <a href="#">Projects</a>
                    <a href="#">My Setup</a>
                    <a href="#">Blog</a>
                </div>
            </div>

            <a href="/experiments" class="nav-item">Experiments</a>

            <!-- Gamble Action Button -->
            <button class="nav-item gamble-btn" onclick="gambleClick()">
                Gamble
            </button>
        </div>
    </div>
</nav>

<script>
    function toggleDropdown(e, id) {
        // Prevent click from bubbling up to window
        e.stopPropagation();
        
        const menu = document.getElementById(id);
        const parentBtn = e.currentTarget;
        const isAlreadyActive = menu.classList.contains('active');

        // Close all other open menus first
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));

        // Toggle the clicked menu
        if (!isAlreadyActive) {
            menu.classList.add('active');
            parentBtn.classList.add('active-nav');
        }
    }

    function gambleClick() {
        const nav = document.getElementById('dg-navbar');
        const roll = Math.floor(Math.random() * 100) + 1;

        if (roll === 7) {
            nav.classList.add('rainbow-mode');
            alert("🎰 JACKPOT! The house loses for once.");
        } else {
            alert("The house wins. Better luck next time.");
        }
    }

    // Close dropdowns if the user clicks anywhere else on the page
    window.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
    });
</script>

</body>
</html>
