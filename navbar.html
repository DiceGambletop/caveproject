<!-- NAVBAR COMPONENT -->
<style>
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: rgba(13, 17, 23, 0.85);
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }

  .nav-logo {
    font-weight: bold;
    font-style: italic;
    font-size: 1.2rem;
    color: #f0f6fc;
    letter-spacing: 0.1em;
    text-decoration: none;
    transition: 0.2s;
  }

  .nav-logo:hover {
    color: #58a6ff;
    text-shadow: 0 0 8px #58a6ff;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .nav-links button {
    background: none;
    border: none;
    color: #c9d1d9;
    font-size: 1rem;
    font-weight: 300;
    cursor: pointer;
    transition: 0.2s;
  }

  .nav-links button:hover {
    color: #58a6ff;
    text-shadow: 0 0 6px #58a6ff;
  }

  /* DROPDOWNS */
  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    display: none;
    position: absolute;
    top: 40px;
    right: 0;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 0;
    min-width: 150px;
    box-shadow: 0 0 10px rgba(0,0,0,0.4);
  }

  .dropdown-menu a {
    display: block;
    padding: 10px 20px;
    color: #c9d1d9;
    text-decoration: none;
    transition: 0.2s;
  }

  .dropdown-menu a:hover {
    background: #1f6feb33;
    color: #58a6ff;
  }

  /* RAINBOW MODE */
  .rainbow {
    animation: rainbow 2s linear infinite;
  }

  @keyframes rainbow {
    0% { background: #ff0000; }
    16% { background: #ff7f00; }
    33% { background: #ffff00; }
    50% { background: #00ff00; }
    66% { background: #0000ff; }
    83% { background: #4b0082; }
    100% { background: #9400d3; }
  }
</style>

<nav id="navbar">
  <a href="/" class="nav-logo">DICE GAMBLETOP</a>

  <div class="nav-links">

    <!-- SCHOOLWORK -->
    <div class="dropdown">
      <button onclick="toggleDropdown('school')">Schoolwork</button>
      <div id="school" class="dropdown-menu">
        <a href="#">Placeholder 1</a>
        <a href="#">Placeholder 2</a>
        <a href="#">Placeholder 3</a>
      </div>
    </div>

    <!-- PERSONAL -->
    <div class="dropdown">
      <button onclick="toggleDropdown('personal')">Personal</button>
      <div id="personal" class="dropdown-menu">
        <a href="#">Placeholder 1</a>
        <a href="#">Placeholder 2</a>
        <a href="#">Placeholder 3</a>
      </div>
    </div>

    <!-- EXPERIMENTS -->
    <div class="dropdown">
      <button onclick="toggleDropdown('experiments')">Experiments</button>
      <div id="experiments" class="dropdown-menu">
        <a href="#">Placeholder 1</a>
        <a href="#">Placeholder 2</a>
        <a href="#">Placeholder 3</a>
      </div>
    </div>

    <!-- GAMBLING (RAINBOW CHANCE) -->
    <button onclick="gamble()">Gambling</button>

  </div>
</nav>

<script>
  function toggleDropdown(id) {
    document.querySelectorAll('.dropdown-menu').forEach(menu => {
      if (menu.id === id) {
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      } else {
        menu.style.display = 'none';
      }
    });
  }

  function gamble() {
    const navbar = document.getElementById('navbar');
    const chance = Math.floor(Math.random() * 100) + 1;

    if (chance === 1) {
      navbar.classList.add('rainbow');
      alert("🎉 JACKPOT! You hit the 1/100 rainbow navbar!");
    } else {
      alert("No luck this time.");
    }
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown')) {
      document.querySelectorAll('.dropdown-menu').forEach(menu => menu.style.display = 'none');
    }
  });
</script>
